name: Extract FP1 Telemetry
on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year'
        required: true
        default: '2026'
      event:
        description: 'Event name'
        required: true
  schedule:
    - cron: '30 4,7,10 * * 5,6'
env:
  PYTHONDONTWRITEBYTECODE: 1
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-pipeline
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-py3.10-${{ hashFiles('data-pipeline/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-py3.10-
      - name: Install dependencies
        run: uv pip install -r requirements.txt --system
      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Extract FP1 telemetry
        env:
          GITHUB_ACTIONS: "true"
          YEAR: ${{ github.event.inputs.year || '2026' }}
          EVENT: ${{ github.event.inputs.event || '' }}
        run: python tel.py $YEAR "$EVENT" FP1
      - name: Commit and push data
        run: |
          git config advice.addIgnoredFile false
          find .. -name "*.json" -not -path "*/.git/*" -exec git add --force --sparse {} +
          if ! git diff --cached --quiet; then
            git commit -m "Update F1 telemetry data [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
